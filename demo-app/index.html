<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Demo App - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 320px; text-align: center; }
        h2 { margin-top: 0; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #6366f1; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4f46e5; }
        .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; display: none; margin-bottom: 15px; font-size: 0.9em; border: 1px solid #fca5a5; }
        .link { margin-top: 20px; font-size: 0.9em; }
        a { color: #6366f1; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Entrar no Sistema</h2>
        <div id="error-msg" class="error">Credenciais inválidas. Tente teste@demo.com e 123456</div>
        <input type="email" id="email" placeholder="Seu email" data-test="email-input">
        <input type="password" id="password" placeholder="Sua senha" data-test="password-input">
        <button id="login-btn" data-test="login-btn" onclick="login()">Entrar</button>
        <div class="link">Não tem uma conta? <a href="register.html" data-test="register-link">Cadastre-se</a></div>
    </div>
    <script>
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === 'teste@demo.com' && pass === '123456') {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
